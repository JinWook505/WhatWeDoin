services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://backend:8080}
      - NEXT_PUBLIC_KAKAO_MAP_KEY=${NEXT_PUBLIC_KAKAO_MAP_KEY}
    env_file:
      - .env.local
    networks:
      - whatwedoin-network

networks:
  whatwedoin-network:
    external: true
